<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DengiDermo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>DengiDermo</h1>

      <section class="card controls">
        <button id="createGame">Create Game</button>
        <div class="join">
          <input id="roomCode" placeholder="Room ID" maxlength="12" autocomplete="off" />
          <button id="joinGame">Join Game</button>
        </div>
      </section>

      <section class="card status">
        <div>Server: <b id="serverStatus">offline</b></div>
        <div>Room: <b id="roomStatus">—</b></div>
        <div>Role: <b id="roleStatus">—</b></div>
        <div>P2P: <b id="p2pStatus">closed</b></div>
      </section>

      <canvas id="game" width="960" height="540"></canvas>

      <section class="card help">
        <p>WASD / arrows to move. Space to test boss damage.</p>
        <button id="copyRoom">Copy Room ID</button>
        <button id="ping">Ping Peer</button>
      </section>

      <pre id="log"></pre>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
