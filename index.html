<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>nncckkrr</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      cursor:none;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#050505;
      font-family:Inter,sans-serif;
      touch-action:none;
    }

    canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
    }

    .cursor{
      position:fixed;
      width:24px;
      height:24px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.8);
      pointer-events:none;
      z-index:1000;
      transform:translate(-50%,-50%);
      transition:width .25s,height .25s,border .25s;
      backdrop-filter:blur(4px);
    }

    .cursor-inner{
      position:fixed;
      width:6px;
      height:6px;
      border-radius:50%;
      background:white;
      pointer-events:none;
      z-index:1001;
      transform:translate(-50%,-50%);
    }

    .grain{
      position:fixed;
      inset:-200%;
      background-image:
      url("https://grainy-gradients.vercel.app/noise.svg");
      opacity:.06;
      animation:grain 8s steps(10) infinite;
      pointer-events:none;
    }

    @keyframes grain{
      0%{transform:translate(0,0)}
      10%{transform:translate(-5%,-10%)}
      20%{transform:translate(-15%,5%)}
      30%{transform:translate(7%,-25%)}
      40%{transform:translate(-5%,25%)}
      50%{transform:translate(-15%,10%)}
      60%{transform:translate(15%,0%)}
      70%{transform:translate(0%,15%)}
      80%{transform:translate(3%,35%)}
      90%{transform:translate(-10%,10%)}
      100%{transform:translate(0,0)}
    }

    @media (max-width:768px){

      *{
        cursor:auto;
      }

      .cursor,
      .cursor-inner{
        display:none;
      }
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="grain"></div>

<div class="cursor"></div>
<div class="cursor-inner"></div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let width
let height

const nickname = "nncckkrr"
const altText = "visual artist"

let activeText = nickname

const particles = []

const mouse = {
  x:0,
  y:0,
  down:false
}

const cursor = {
  x:0,
  y:0
}

const inner = {
  x:0,
  y:0
}

let particleCount

class Particle{

  constructor(x,y,index){

    this.baseX = x
    this.baseY = y

    this.x = x
    this.y = y

    this.vx = 0
    this.vy = 0

    this.index = index

    this.offset = Math.random() * 1000

    this.size = Math.random() * 8 + 12
  }

  getLetter(){

    const text = activeText

    const speed = 0.45

    const shift =
      Math.floor(
        performance.now() * 0.001 * speed +
        this.index * 0.35
      )

    return text[
      shift % text.length
    ]
  }

  update(){

    const dx = mouse.x - this.x
    const dy = mouse.y - this.y

    const dist = Math.sqrt(dx * dx + dy * dy)

    if(dist < 220){

      const force = (220 - dist) / 220

      const angle = Math.atan2(dy,dx)

      this.vx -= Math.cos(angle) * force * 2.2
      this.vy -= Math.sin(angle) * force * 2.2
    }

    this.vx += (this.baseX - this.x) * 0.008
    this.vy += (this.baseY - this.y) * 0.008

    this.vx *= 0.94
    this.vy *= 0.94

    this.x += this.vx
    this.y += this.vy
  }

  draw(){

    ctx.font = `${this.size}px Inter`

    ctx.fillStyle = "rgba(255,255,255,.82)"

    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    ctx.fillText(
      this.getLetter(),
      this.x,
      this.y
    )
  }
}

function createParticles(){

  particles.length = 0

  width = canvas.width = window.innerWidth
  height = canvas.height = window.innerHeight

  const mobile = width < 768

  particleCount = mobile ? 90 : 180

  for(let i=0;i<particleCount;i++){

    const padding = mobile ? 40 : 80

    const x =
      Math.random() * (width - padding * 2)
      + padding

    const y =
      Math.random() * (height - padding * 2)
      + padding

    particles.push(
      new Particle(x,y,i)
    )
  }

  mouse.x = width / 2
  mouse.y = height / 2
}

createParticles()

function drawConnections(){

  for(let a=0;a<particles.length;a++){

    for(let b=a+1;b<particles.length;b++){

      const dx =
        particles[a].x - particles[b].x

      const dy =
        particles[a].y - particles[b].y

      const dist =
        Math.sqrt(dx * dx + dy * dy)

      const maxDist =
        width < 768 ? 120 : 160

      if(dist < maxDist){

        const opacity =
          (1 - dist / maxDist) * 0.12

        ctx.beginPath()

        ctx.moveTo(
          particles[a].x,
          particles[a].y
        )

        ctx.lineTo(
          particles[b].x,
          particles[b].y
        )

        ctx.strokeStyle =
          `rgba(255,255,255,${opacity})`

        ctx.lineWidth = .7

        ctx.stroke()
      }
    }
  }
}

function animate(){

  ctx.clearRect(0,0,width,height)

  const gradient =
    ctx.createRadialGradient(
      mouse.x,
      mouse.y,
      0,
      mouse.x,
      mouse.y,
      300
    )

  gradient.addColorStop(
    0,
    "rgba(255,255,255,.05)"
  )

  gradient.addColorStop(
    1,
    "rgba(255,255,255,0)"
  )

  ctx.fillStyle = gradient
  ctx.fillRect(0,0,width,height)

  particles.forEach(p => p.update())

  drawConnections()

  particles.forEach(p => p.draw())

  cursor.x += (mouse.x - cursor.x) * 0.1
  cursor.y += (mouse.y - cursor.y) * 0.1

  inner.x += (mouse.x - inner.x) * 0.28
  inner.y += (mouse.y - inner.y) * 0.28

  document.querySelector(".cursor").style.transform =
    `translate(${cursor.x}px,${cursor.y}px) translate(-50%,-50%)`

  document.querySelector(".cursor-inner").style.transform =
    `translate(${inner.x}px,${inner.y}px) translate(-50%,-50%)`

  requestAnimationFrame(animate)
}

animate()

window.addEventListener("mousemove",e=>{

  mouse.x = e.clientX
  mouse.y = e.clientY
})

window.addEventListener("touchmove",e=>{

  mouse.x = e.touches[0].clientX
  mouse.y = e.touches[0].clientY

},{passive:true})

function activateAlt(){

  activeText = altText

  document.querySelector(".cursor").style.width = "48px"
  document.querySelector(".cursor").style.height = "48px"
  document.querySelector(".cursor").style.border =
    "1px solid rgba(255,255,255,.3)"
}

function deactivateAlt(){

  activeText = nickname

  document.querySelector(".cursor").style.width = "24px"
  document.querySelector(".cursor").style.height = "24px"
  document.querySelector(".cursor").style.border =
    "1px solid rgba(255,255,255,.8)"
}

window.addEventListener("mousedown",()=>{

  mouse.down = true
  activateAlt()
})

window.addEventListener("mouseup",()=>{

  mouse.down = false
  deactivateAlt()
})

window.addEventListener("touchstart",()=>{

  mouse.down = true
  activateAlt()
})

window.addEventListener("touchend",()=>{

  mouse.down = false
  deactivateAlt()
})

window.addEventListener("resize",()=>{

  createParticles()
})

</script>

</body>
</html>
