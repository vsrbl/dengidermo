<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>nncckkrr.space</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section id="menu" class="panel">
        <p class="eyebrow">P2P roguelike base</p>
        <h1>nncckkrr.space</h1>
        <p class="muted">Create a room or join with an ID.</p>

        <label for="roomInput">Room ID</label>
        <input id="roomInput" autocomplete="off" maxlength="12" placeholder="AB12CD" />

        <label for="serverInput">Render server URL</label>
        <input id="serverInput" autocomplete="off" spellcheck="false" />

        <div class="row">
          <button id="createBtn" type="button">Create game</button>
          <button id="joinBtn" type="button">Join game</button>
        </div>

        <p id="menuStatus" class="status">Offline.</p>
      </section>

      <section id="game" class="panel hidden">
        <div class="topbar">
          <div>
            <p class="eyebrow">room</p>
            <h2 id="roomTitle">------</h2>
          </div>
          <div class="right">
            <p id="netStatus" class="status">Connecting...</p>
            <button id="leaveBtn" type="button">Leave</button>
          </div>
        </div>

        <canvas id="screen" width="320" height="200" aria-label="Game screen"></canvas>

        <div class="hud">
          <span>Move: WASD / Arrows</span>
          <span>Hit: Space</span>
          <span id="bossHud">Boss HP: --</span>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
