<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>nncckkrr.space</title>

    <link rel="stylesheet" href="./style.css?v=relay-rescue">
</head>

<body>

<div id="mobile-only">only for pc</div>

<div id="ui">

    <h1>nncckkrr.space</h1>

    <button id="btn-host">
        Create Game
    </button>

    <input
        type="text"
        id="input-id"
        placeholder="Host ID"
    >

    <button id="btn-join">
        Join Game
    </button>

    <div id="status">

    </div>

</div>

<div id="hud">

    <div>
        ROOM:
        <span id="hud-id">-</span>
    </div>

    <div>
        PLAYERS:
        <span id="hud-count">1</span>
    </div>

</div>

<canvas
    id="gameCanvas"
    width="1280"
    height="720"
></canvas>

<div id="version-label">relay rescue version</div>

<script type="module" src="./js/main.js?v=relay-rescue"></script>

</body>
</html>
