<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DENGIDERMO</title>

    <link rel="stylesheet" href="./style.css">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

<div id="mobile-only">only for pc</div>

<div id="ui">

    <h1>DENGIDERMO</h1>

    <button id="btn-host">
        Создать игру
    </button>

    <input
        type="text"
        id="input-id"
        placeholder="ID хоста"
    >

    <button id="btn-join">
        Подключиться
    </button>

    <div id="status">
        Ожидание...
    </div>

</div>

<div id="hud">

    <div>
        ROOM:
        <span id="hud-id">-</span>
    </div>

    <div>
        PLAYERS:
        <span id="hud-count">1</span>
    </div>

</div>

<canvas
    id="gameCanvas"
    width="1280"
    height="720"
></canvas>

<script type="module" src="./js/main.js"></script>

</body>
</html>
