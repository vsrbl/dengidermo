<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>B&W P2P Roguelike v4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; background-color: #111; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; user-select: none;
        }
        canvas {
            background-color: #000; border: 2px solid #fff;
            image-rendering: pixelated; display: none; cursor: crosshair;
        }
        
        /* Главное меню (Лобби) */
        #ui {
            text-align: center; border: 2px solid #fff; padding: 20px; background: #000; width: 350px;
        }
        input, button {
            background: #000; color: #fff; border: 1px solid #fff;
            padding: 10px; margin: 5px; font-family: inherit; cursor: pointer; width: 80%; box-sizing: border-box;
        }
        button:hover { background: #fff; color: #000; }
        #status { margin-top: 15px; font-size: 14px; }
        
        /* Игровой интерфейс (HUD поверх игры) */
        #hud {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); border: 2px solid #fff; padding: 10px 20px;
            text-align: center; display: none; z-index: 100; min-width: 250px;
        }
        #hud-id {
            font-weight: bold; padding: 2px 8px; border: 1px dashed #fff; 
            cursor: pointer; transition: 0.2s; background: #222;
        }
        #hud-id:hover { background: #444; }
        #hud-id:active { background: #666; border-color: #4ade80; color: #4ade80; }
        #copy-status { font-size: 12px; color: #4ade80; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .hud-row { margin: 5px 0; }
        
    </style>
</head>
<body>

    <!-- Меню -->
    <div id="ui">
        <h2>B&W ROGUELIKE</h2>
        <button id="btn-host">Создать игру</button><br><br>
        <input type="text" id="input-id" placeholder="Вставь ID друга сюда">
        <button id="btn-join">Подключиться</button>
        <div id="status">Ожидание...</div>
    </div>

    <!-- HUD (Появляется только в игре) -->
    <div id="hud">
        <div class="hud-row">Комната: <span id="hud-id" title="Нажми, чтобы скопировать"></span> <span id="copy-status">✔</span></div>
        <div class="hud-row">Игроки: <span id="hud-count">1 / 4</span></div>
    </div>

    <!-- Игра -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const hud = document.getElementById('hud');
    const statusDiv = document.getElementById('status');
    const hudIdDisplay = document.getElementById('hud-id');
    const hudCountDisplay = document.getElementById('hud-count');

    let peer = null, isHost = false, myId = null;
    let gameStarted = false; 

    const MAX_PLAYERS = 4;
    let connections = {}; 
    let hostConnection = null; 

    const PLAYER_SPEED = 4;
    const BULLET_SPEED = 8;
    const FIRE_COOLDOWN = 250; 
    const PLAYER_SIZE = 10; 

    // Добавили playerCount в gameState, чтобы рассылать всем
    let gameState = { players: {}, bullets: [], loot: [], playerCount: 1 };
    const input = { w: false, a: false, s: false, d: false, mouseX: 0, mouseY: 0, mouseDown: false };

    const myPeerConfig = {
        host: 'dengidermo-1.onrender.com', 
        port: 443,                       
        path: '/myapp',
        secure: true                     
    };

    // --- ЛОГИКА HUD И КОПИРОВАНИЯ ---
    hudIdDisplay.addEventListener('click', () => {
        const idToCopy = hudIdDisplay.innerText;
        navigator.clipboard.writeText(idToCopy).then(() => {
            const copyStatus = document.getElementById('copy-status');
            copyStatus.style.opacity = '1';
            setTimeout(() => copyStatus.style.opacity = '0', 2000);
        });
    });

    function updateHUD(id, count) {
        if (id) hudIdDisplay.innerText = id;
        hudCountDisplay.innerText = count + " / " + MAX_PLAYERS;
    }

    // --- СЕТЬ (PEERJS) ---
    document.getElementById('btn-host').onclick = () => {
        isHost = true; 
        peer = new Peer(myPeerConfig);
        statusDiv.innerText = "Подключение к серверу...";
        
        peer.on('open', (id) => {
            myId = id; 
            updateHUD(myId, 1);
            gameState.players[myId] = { x: canvas.width/2, y: canvas.height/2, score: 0, lastShot: 0 };
            for(let i=0; i<5; i++) spawnLoot();
            if (!gameStarted) startGame(); 
        });

        peer.on('connection', (conn) => {
            // ПРОВЕРКА НА ЛИМИТ ИГРОКОВ (Хост + 3 клиента = 4)
            if (Object.keys(connections).length >= MAX_PLAYERS - 1) {
                conn.on('open', () => {
                    conn.send({ error: 'Комната заполнена (максимум 4 игрока)!' });
                    setTimeout(() => conn.close(), 500);
                });
                return;
            }

            // Если места есть, пускаем игрока
            connections[conn.peer] = conn; 
            gameState.playerCount = Object.keys(connections).length + 1; // Обновляем счетчик
            updateHUD(myId, gameState.playerCount); // Обновляем HUD у хоста

            gameState.players[conn.peer] = { x: canvas.width/2, y: canvas.height/2, score: 0, lastShot: 0 };
            
            conn.on('data', (data) => processClientInput(conn.peer, data));
            
            conn.on('close', () => {
                delete connections[conn.peer];
                delete gameState.players[conn.peer];
                gameState.playerCount = Object.keys(connections).length + 1;
                updateHUD(myId, gameState.playerCount);
            });
        });
    };

    document.getElementById('btn-join').onclick = () => {
        const hostId = document.getElementById('input-id').value.trim();
        if (!hostId) return;
        
        isHost = false; 
        peer = new Peer(myPeerConfig);
        statusDiv.innerText = "Подключение...";
        
        peer.on('open', (id) => {
            myId = id; 
            hostConnection = peer.connect(hostId, { reliable: false });
            
            hostConnection.on('open', () => { 
                statusDiv.innerText = "В игре!"; 
                updateHUD(hostId, "?"); // Сначала ставим вопрос, потом придут данные от хоста
                if (!gameStarted) startGame(); 
            });

            hostConnection.on('data', (data) => { 
                // Проверяем, не выгнал ли нас хост (ошибка лимита)
                if (data.error) {
                    alert(data.error);
                    location.reload(); // Перезагружаем страницу, выкидываем в меню
                    return;
                }
                
                gameState = data; 
                updateHUD(null, gameState.playerCount); // Обновляем цифру игроков у клиента
            }); 
        });
    };

    // --- УПРАВЛЕНИЕ ---
    window.addEventListener('keydown', (e) => { if(input.hasOwnProperty(e.key.toLowerCase())) input[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(input.hasOwnProperty(e.key.toLowerCase())) input[e.key.toLowerCase()] = false; });
    canvas.addEventListener('mousedown', () => input.mouseDown = true);
    canvas.addEventListener('mouseup', () => input.mouseDown = false);
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        input.mouseX = e.clientX - rect.left;
        input.mouseY = e.clientY - rect.top;
    });
    window.addEventListener('blur', () => { input.w = input.a = input.s = input.d = input.mouseDown = false; });

    // --- ФИЗИКА (ТОЛЬКО ХОСТ) ---
    function spawnLoot() {
        gameState.loot.push({ x: Math.random() * (canvas.width - 40) + 20, y: Math.random() * (canvas.height - 40) + 20 });
    }

    function movePlayer(p, controls) {
        let dx = 0, dy = 0;
        if(controls.w) dy -= 1;
        if(controls.s) dy += 1;
        if(controls.a) dx -= 1;
        if(controls.d) dx += 1;

        if(dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            p.x += (dx / length) * PLAYER_SPEED;
            p.y += (dy / length) * PLAYER_SPEED;
        }

        p.x = Math.max(PLAYER_SIZE, Math.min(canvas.width - PLAYER_SIZE, p.x));
        p.y = Math.max(PLAYER_SIZE, Math.min(canvas.height - PLAYER_SIZE, p.y));

        if(controls.mouseDown && Date.now() - p.lastShot > FIRE_COOLDOWN) {
            const angle = Math.atan2(controls.mouseY - p.y, controls.mouseX - p.x);
            gameState.bullets.push({
                x: p.x, y: p.y, vx: Math.cos(angle) * BULLET_SPEED, vy: Math.sin(angle) * BULLET_SPEED
            });
            p.lastShot = Date.now();
        }
    }

    function processClientInput(clientId, clientInput) {
        let p = gameState.players[clientId];
        if (p) movePlayer(p, clientInput);
    }

    function updateHostLogic() {
        let p = gameState.players[myId];
        if(p) movePlayer(p, input);

        for (let i = gameState.bullets.length - 1; i >= 0; i--) {
            let b = gameState.bullets[i];
            b.x += b.vx; b.y += b.vy;
            if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) gameState.bullets.splice(i, 1);
        }

        for (let id in gameState.players) {
            let player = gameState.players[id];
            for (let i = gameState.loot.length - 1; i >= 0; i--) {
                let l = gameState.loot[i];
                if (Math.abs(player.x - l.x) < 15 && Math.abs(player.y - l.y) < 15) {
                    player.score += 10;
                    gameState.loot.splice(i, 1);
                    spawnLoot();
                }
            }
        }
    }

    // --- ОТРИСОВКА И ЦИКЛ ---
    function startGame() {
        if (gameStarted) return; 
        gameStarted = true;
        
        ui.style.display = 'none'; // Прячем главное меню
        hud.style.display = 'block'; // Показываем Игровой HUD
        canvas.style.display = 'block'; // Показываем игру
        
        setInterval(() => {
            if (isHost) {
                for (let id in connections) {
                    if (connections[id].open) connections[id].send(gameState);
                }
            } else if (hostConnection && hostConnection.open) {
                hostConnection.send(input);
            }
        }, 1000 / 30); 

        gameLoop(); 
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#fff';
        gameState.loot.forEach(l => {
            ctx.fillRect(l.x - 4, l.y - 1, 8, 2); ctx.fillRect(l.x - 1, l.y - 4, 2, 8);
        });

        gameState.bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 2, 4, 4));

        for (let id in gameState.players) {
            let p = gameState.players[id];
            if (id === myId) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x - PLAYER_SIZE, p.y - PLAYER_SIZE, PLAYER_SIZE*2, PLAYER_SIZE*2);
            } else {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.strokeRect(p.x - PLAYER_SIZE, p.y - PLAYER_SIZE, PLAYER_SIZE*2, PLAYER_SIZE*2);
            }
            ctx.fillStyle = '#fff'; ctx.font = "14px Courier New";
            ctx.fillText(p.score, p.x - 10, p.y - 15);
        }
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.beginPath();
        ctx.arc(input.mouseX, input.mouseY, 5, 0, Math.PI * 2); ctx.stroke();
    }

    function gameLoop() {
        if (isHost) updateHostLogic();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
