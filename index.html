<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>nncckkrr.space</title>
    <link rel="stylesheet" href="style.css?v=10" />
  </head>
  <body>
    <main class="shell">
      <section id="menu" class="panel">
        <h1>nncckkrr.space</h1>

        <label for="roomInput">Room ID</label>
        <input id="roomInput" autocomplete="off" maxlength="12" placeholder="AB12CD" />

        <div class="row">
          <button id="createBtn" type="button">Create game</button>
          <button id="joinBtn" type="button">Join game</button>
        </div>
      </section>

      <section id="game" class="panel hidden">
        <div class="topbar">
          <div class="roomLine">
            <p class="mini">ROOM</p>
            <h2 id="roomTitle" title="Click to copy" draggable="false">------</h2>
          </div>
          <div class="right">
            <p id="netStatus" class="status">Connecting...</p>
          </div>
        </div>

        <canvas id="screen" width="480" height="270" aria-label="Game screen"></canvas>

        <div class="hud">
          <span>WASD / ARROWS</span>
          <span>MOUSE AIM / FIRE</span>
          <span>ESC EXIT</span>
          <span id="gameHud">HP -- | WEAPON -- | MOBS --</span>
        </div>
      </section>
    </main>

    <script src="config.js?v=10"></script>
    <script src="app.js?v=10"></script>
  </body>
</html>
